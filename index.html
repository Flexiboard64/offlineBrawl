<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Unity WebGL Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    #unity-container {
      width: 100%;
      height: 100%;
    }
    canvas {
      width: 100%;
      height: 100%;
      background: black;
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>
  </div>

  <script src="web.loader.js"></script>

  <script>
    const buildUrl = ".";

    const config = {
      dataUrl: buildUrl + "/web.data.unityweb",
      frameworkUrl: buildUrl + "/web.framework.js.unityweb",
      codeUrl: buildUrl + "/web.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Unity",
      productName: "WebGL Game",
      productVersion: "1.0",
    };

    const canvas = document.querySelector("#unity-canvas");

    createUnityInstance(canvas, config)
      .then((unityInstance) => {
        console.log("Unity loaded");
      })
      .catch((message) => {
        console.error(message);
      });
  </script>
</body>
</html>
